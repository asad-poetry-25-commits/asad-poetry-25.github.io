<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asad_Poetry_25 Portfolio</title>
    <style>
        /* Ye "Class" ka jaadu hai: Design yahan se control hota hai */
        body { background-color: #121212; color: white; font-family: 'Arial', sans-serif; text-align: center; padding: 50px; }
        
        .profile-card { 
            background: #1e1e1e; padding: 30px; border-radius: 20px; 
            border: 2px solid #ffd700; display: inline-block; box-shadow: 0 0 20px #ffd700;
        }

        .shayar-img { 
            width: 150px; height: 150px; border-radius: 50%; 
            border: 3px solid white; object-fit: cover; margin-bottom: 20px;
        }

        .shayari-text { font-size: 24px; font-style: italic; color: #ffd700; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="mypic.jpg" class="shayar-img" alt="Asad Azam">
        <h1>Asad_Poetry_25</h1>
        <p>"Lafz bolte hain, par dil khamosh hai..." 🌹</p>
        
        <div class="shayari-text">
            "Farsh par bikhre dil ka ek ek tukda, meri ek ek shayari hai."
        </div>
    </div>

</body>
</html>
